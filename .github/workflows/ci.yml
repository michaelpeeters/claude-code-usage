name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: pip install ruff mypy PyQt6
      - name: ruff check
        run: ruff check claude_usage.py tests/
      - name: ruff format
        run: ruff format --check claude_usage.py tests/
      - name: mypy
        run: mypy claude_usage.py

  test-linux:
    name: test (linux, ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Qt system libraries
        run: sudo apt-get update && sudo apt-get install -y libgl1 libegl1 libxkbcommon-x11-0
      - name: Install Python dependencies
        run: pip install PyQt6 pytest
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v

  test-macos:
    name: test (macos, 3.12)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: pip install PyQt6 pytest
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v

  test-windows:
    name: test (windows, 3.12)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: pip install PyQt6 pytest
      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v

  gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [lint, test-linux, test-macos, test-windows]
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more checks failed or were cancelled"
            exit 1
          fi
          echo "All checks passed"
