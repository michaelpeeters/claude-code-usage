name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.5)"
        required: true

permissions:
  contents: write

env:
  # Works for both tag pushes and workflow_dispatch
  REL_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # ── Linux AppImage ────────────────────────────────────────────────────────
  appimage:
    name: Build AppImage (Linux x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-cursor0 libfuse2 patchelf librsvg2-bin

      - name: Install PyInstaller + app deps
        run: pip install PyInstaller PyQt6

      - name: Inject release version
        run: sed -i "s/APP_VERSION = .*/APP_VERSION = \"${{ env.REL_TAG }}\"/" claude_usage.py

      - name: Render icon PNG from SVG
        run: rsvg-convert -w 256 -h 256 packaging/claude-usage.svg -o packaging/claude-usage.png

      - name: Bundle with PyInstaller
        run: |
          pyinstaller \
            --onedir \
            --windowed \
            --name claude-usage \
            --add-data "packaging/claude-usage.desktop:." \
            claude_usage.py

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r dist/claude-usage/* AppDir/
          cp packaging/claude-usage.desktop AppDir/claude-usage.desktop
          cp packaging/claude-usage.desktop AppDir/usr/share/applications/
          cp packaging/claude-usage.png AppDir/claude-usage.png
          cp packaging/claude-usage.png AppDir/utilities-system-monitor.png
          cp packaging/claude-usage.png AppDir/usr/share/icons/hicolor/256x256/apps/claude-usage.png
          cp packaging/claude-usage.png AppDir/usr/share/icons/hicolor/256x256/apps/utilities-system-monitor.png
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "$HERE/claude-usage" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Download appimagetool
        run: |
          wget -q -O appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Create AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          VERSION: ${{ env.REL_TAG }}
        run: ./appimagetool AppDir claude-usage-${{ env.REL_TAG }}-x86_64.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: claude-usage-linux
          path: "*.AppImage"

  # ── macOS app bundle ──────────────────────────────────────────────────────
  macos:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PyInstaller + app deps
        run: pip install PyInstaller PyQt6 Pillow
      - name: Inject release version
        run: sed -i "" "s/APP_VERSION = .*/APP_VERSION = \"${{ env.REL_TAG }}\"/" claude_usage.py
      - name: Bundle
        run: |
          pyinstaller --windowed --name "Claude Usage" \
            --icon packaging/claude-usage.png \
            claude_usage.py
          ditto -c -k --keepParent "dist/Claude Usage.app" \
            "claude-usage-${{ env.REL_TAG }}-macos.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: claude-usage-macos
          path: "*.zip"

  # ── Windows exe ───────────────────────────────────────────────────────────
  windows:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PyInstaller + app deps
        run: pip install PyInstaller PyQt6 Pillow
      - name: Inject release version
        run: (Get-Content claude_usage.py) -replace 'APP_VERSION = .*', 'APP_VERSION = "${{ env.REL_TAG }}"' | Set-Content claude_usage.py
      - name: Bundle
        run: pyinstaller --onefile --windowed --name claude-usage --icon packaging/claude-usage.png claude_usage.py
      - uses: actions/upload-artifact@v7
        with:
          name: claude-usage-windows
          path: dist/claude-usage.exe

  # ── GitHub Release ────────────────────────────────────────────────────────
  publish:
    name: Publish release
    needs: [appimage, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.REL_TAG }}
          generate_release_notes: true
          files: |
            *.AppImage
            *.zip
            *.exe

      - name: Prune old releases (keep 5)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --repo ${{ github.repository }} --limit 100 --json tagName,isDraft,isPrerelease \
            | jq -r '.[] | select(.isDraft == false and .isPrerelease == false) | .tagName' \
            | tail -n +6 \
            | xargs -I{} gh release delete {} --repo ${{ github.repository }} --yes --cleanup-tag || true
