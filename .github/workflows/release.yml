name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Linux AppImage ────────────────────────────────────────────────────────
  appimage:
    name: Build AppImage (Linux x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get install -y \
            libgl1 libegl1 libxkbcommon-x11-0 libdbus-1-3 \
            libxcb-cursor0 libfuse2 patchelf

      - name: Install PyInstaller + app deps
        run: pip install PyInstaller PyQt6

      - name: Bundle with PyInstaller
        run: |
          pyinstaller \
            --onedir \
            --windowed \
            --name claude-usage \
            --add-data "packaging/claude-usage.desktop:." \
            claude_usage.py

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/share/applications
          cp -r dist/claude-usage/* AppDir/
          cp packaging/claude-usage.desktop AppDir/claude-usage.desktop
          cp packaging/claude-usage.desktop AppDir/usr/share/applications/
          # Minimal AppRun wrapper
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "$HERE/claude-usage" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Download appimagetool
        run: |
          wget -q -O appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Create AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          VERSION: ${{ github.ref_name }}
        run: ./appimagetool AppDir claude-usage-${{ github.ref_name }}-x86_64.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: claude-usage-linux
          path: "*.AppImage"

  # ── macOS app bundle ──────────────────────────────────────────────────────
  macos:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PyInstaller + app deps
        run: pip install PyInstaller PyQt6
      - name: Bundle
        run: |
          pyinstaller --onefile --windowed --name "Claude Usage" claude_usage.py
          cd dist && zip -r ../claude-usage-${{ github.ref_name }}-macos.zip "Claude Usage.app"
      - uses: actions/upload-artifact@v4
        with:
          name: claude-usage-macos
          path: "*.zip"

  # ── Windows exe ───────────────────────────────────────────────────────────
  windows:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PyInstaller + app deps
        run: pip install PyInstaller PyQt6
      - name: Bundle
        run: pyinstaller --onefile --windowed --name claude-usage claude_usage.py
      - uses: actions/upload-artifact@v4
        with:
          name: claude-usage-windows
          path: dist/claude-usage.exe

  # ── GitHub Release ────────────────────────────────────────────────────────
  publish:
    name: Publish release
    needs: [appimage, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.AppImage
            *.zip
            *.exe
